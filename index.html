<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeonPlay | Premium Web Games</title>

<style>
:root{
--bg-dark:#0a0a0a;
--card-bg:#161616;
--neon-green:#39ff14;
--dim-green:#1f4d1a;
--text-gray:#a0a0a0;
}

/* =========================
   RESPONSIVE DESIGN
========================= */

/* Tablets */

@media (max-width: 1024px){

.main-wrapper{
flex-direction:column;
}

.sidebar{
position:relative;
top:0;
}

.sidebar-ad{
width:100%;
max-width:300px;
margin:auto;
}

}

/* Phones */

@media (max-width: 768px){

header{
flex-direction:column;
gap:8px;
text-align:center;
}

.logo{
font-size:1.5rem;
}

.main-wrapper{
padding:15px 4%;
}

.grid{
grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
gap:15px;
}

.game-card img{
height:120px;
}

.banner-728{
width:100%;
height:90px;
}

.sidebar{
margin-top:10px;
}

}

/* Small Phones */

@media (max-width: 480px){

.grid{
grid-template-columns:repeat(2,1fr);
}

.game-card img{
height:100px;
}

.game-title{
font-size:.75rem;
}

.exit-btn{
padding:5px 10px;
font-size:.8rem;
}

#loading-interface{
padding:25px;
}

}

body{
background:var(--bg-dark);
color:white;
font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
margin:0;
overflow-x:hidden;
}

header{
border-bottom:2px solid var(--neon-green);
padding:1rem 5%;
display:flex;
justify-content:space-between;
align-items:center;
background:linear-gradient(180deg,#111 0%,#0a0a0a 100%);
box-shadow:0 0 15px rgba(57,255,20,0.2);
}

.logo{
font-size:1.8rem;
font-weight:bold;
color:var(--neon-green);
letter-spacing:2px;
}

.main-wrapper{
display:flex;
padding:20px 5%;
gap:20px;
}

.content-area{flex:3;}

.sidebar{
flex:1;
background:var(--card-bg);
border:1px solid #222;
border-radius:10px;
display:flex;
flex-direction:column;
min-height:500px;
position:sticky;
top:20px;
}

.sidebar-header{
background:#111;
border-bottom:1px solid var(--dim-green);
display:flex;
justify-content:space-around;
padding:10px 0;
}

.sidebar-header span{
font-size:.75rem;
color:var(--neon-green);
cursor:pointer;
font-weight:bold;
}

.sidebar-body{
padding:15px;
flex-grow:1;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

.sidebar-ad{
width:300px;
height:250px;
background:#000;
border:1px dashed var(--dim-green);
display:flex;
align-items:center;
justify-content:center;
color:var(--dim-green);
font-size:.8rem;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:20px;
}

.game-card{
background:var(--card-bg);
border-radius:10px;
overflow:hidden;
border:1px solid #222;
cursor:pointer;
transition:.3s;
}

.game-card:hover{
transform:translateY(-5px);
border-color:var(--neon-green);
}

.game-card img{
width:100%;
height:140px;
object-fit:cover;
}

.game-info{padding:10px;}

#player-overlay{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.9);
backdrop-filter:blur(10px);
z-index:1000;
flex-direction:column;
align-items:center;
justify-content:center;
}

/* PLAYER HEADER */

.game-header{
position:absolute;
top:0;
left:0;
width:100%;
background:#111;
border-bottom:2px solid var(--neon-green);
padding:10px 20px;
display:flex;
justify-content:space-between;
align-items:center;
z-index:2000;
}

.game-title{
color:var(--neon-green);
font-size:.9rem;
font-weight:bold;
letter-spacing:1px;
}

.exit-btn{
background:var(--neon-green);
color:black;
padding:6px 15px;
border-radius:4px;
font-weight:bold;
cursor:pointer;
}

/* LOADER */

#loading-interface{
border:2px solid var(--neon-green);
padding:40px;
border-radius:15px;
text-align:center;
background:#000;
}

.spinner{
width:40px;
height:40px;
border:4px solid var(--dim-green);
border-top:4px solid var(--neon-green);
border-radius:50%;
animation:spin 1s linear infinite;
margin:20px auto;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

/* FULLSCREEN GAME */

iframe{
display:none;
position:absolute;
top:50px;
left:0;
width:100%;
height:calc(100% - 50px);
border:none;
}

.ad-slot{
background:#111;
border:1px dashed var(--dim-green);
display:flex;
align-items:center; 
justify-content:center;
color:var(--dim-green);
font-size:.8rem;
}

.banner-728{
width:728px;
height:90px;
margin:15px auto;
max-width:95%;
}

.game-card{
touch-action:manipulation;
}

/* SPLASH SCREEN */

#splash-screen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0a0a0a;
display:flex;
align-items:center;
justify-content:center;
z-index:5000;
flex-direction:column;
animation:fadeOut 1s ease forwards;
animation-delay:5s;
}

.splash-content{
text-align:center;
}

.splash-logo{
font-size:3rem;
color:#39ff14;
letter-spacing:3px;
}

.splash-logo span{
color:white;
}

.splash-tag{
color:#a0a0a0;
margin-top:10px;
font-size:.9rem;
}

/* fade animation */

@keyframes fadeOut{
to{
opacity:0;
visibility:hidden;
}
}

</style>
</head>

<body>

    <div id="splash-screen">
        <div class="splash-content">
          <h1 class="splash-logo">NEON<span>PLAY</span></h1>
          <p class="splash-tag">Loading the Arcade...</p>
        </div>
      </div>

<header>
<div class="logo">NEON<span style="color:white">PLAY</span></div>
<div style="font-size:.8rem;color:var(--neon-green)">MOBILE READY v2.0</div>
</header>

<div class="ad-slot banner-728">TOP BANNER AD</div>

<div class="main-wrapper">

<div class="content-area">

<h2 style="border-left:4px solid var(--neon-green);padding-left:15px;margin-bottom:20px;">
Mission Hub
</h2>

<div class="grid" id="game-grid"></div>

</div>

<aside class="sidebar">

<div class="sidebar-header">
<span onclick="showInfo('privacy')">Privacy</span>
<span onclick="showInfo('about')">About</span>
<span onclick="showInfo('contact')">Contact</span>
</div>

<div class="sidebar-body" id="sidebar-content">
<div class="sidebar-ad">ADSTERRA SIDEBAR AD (300x250)</div>
</div>

</aside>

</div>

<div id="player-overlay">

<div class="game-header">
<span class="game-title" id="playing-title">LOADING...</span>
<div class="exit-btn" onclick="closeGame()">EXIT</div>
</div>

<div class="ad-slot banner-728">OVERLAY TOP AD</div>

<div id="loading-interface">
<h2 id="loading-game-name" style="color:var(--neon-green)">INITIALIZING...</h2>
<div class="spinner"></div>
<p>CONNECTING TO SERVER...</p>
</div>

<iframe id="game-frame"></iframe>

<div class="ad-slot banner-728">OVERLAY BOTTOM AD</div>

</div>

<footer style="text-align:center;padding:20px;color:var(--text-gray)">
© 2026 NeonPlay Arcade
</footer>

<script>

const games=[

{ id:'moto-x3m', name:'Moto X3M', cat:'Racing'},
{ id:'drift-cup-racing', name:'Drift Cup', cat:'Racing'},
{ id:'gulper-io', name:'Gulper.io', cat:'Action'},
{ id:'mr-racer-car-racing-game', name:'Mr Racer', cat:'Racing'},
{ id:'jewels-of-oz', name:'Jewels of Oz', cat:'Puzzle'},
{ id:'cut-the-rope-2', name:'Cut The Rope 2', cat:'Puzzle'},
{ id:'draw-to-home-draw-the-line', name:'Draw To House', cat:'Puzzle'},
{ id:'word-connect', name:'Word Connect', cat:'Puzzle'},
{ id:'vex-x3m', name:'Vex X3M', cat:'Racing'},
{ id:'basketball-stars', name:'Basketball Stars', cat:'Sports'},
{ id:'football-masters', name:'Football Masters', cat:'Sports'},
{ id:'om-nom-run', name:'Om Nom Run', cat:'Action'},
{ id:'protect-my-dog', name:'Protect My Dog', cat:'Puzzle'},
{ id:'bricks-breaker-crush-quest', name:'Bricks Breaker', cat:'Puzzle'},
{ id:'angry-balls', name:'Angry Balls', cat:'Action'}

];

function renderGames(){

const grid=document.getElementById("game-grid");

games.forEach(game=>{

const card=document.createElement("div");

card.className="game-card";

card.onclick=()=>openGame(game.id,game.name);

card.innerHTML=`
<img loading="lazy" src="https://img.gamepix.com/games/${game.id}/cover/${game.id}.png">
<div class="game-info">
<h3>${game.name}</h3>
<p>${game.cat}</p>
</div>
`;

grid.appendChild(card);

});

}

const sidebarContent=document.getElementById('sidebar-content');

const defaultAd='<div class="sidebar-ad">ADSTERRA SIDEBAR AD (300x250)</div>';

const infoTexts={
privacy:"<h3>Privacy Policy</h3><p style='font-size:0.8rem;color:#a0a0a0;'>We do not collect personal data.</p>",
about:"<h3>About Us</h3><p style='font-size:0.8rem;color:#a0a0a0;'>NeonPlay is a hub for HTML5 games.</p>",
contact:"<h3>Contact</h3><p style='font-size:0.8rem;color:#a0a0a0;'>contact@neonplay.io</p>"
};

function showInfo(type){
sidebarContent.innerHTML=infoTexts[type];
setTimeout(()=>{sidebarContent.innerHTML=defaultAd;},15000);
}

function openGame(gameId,gameName){

const frame=document.getElementById("game-frame");
const overlay=document.getElementById("player-overlay");
const loader=document.getElementById("loading-interface");

document.getElementById("loading-game-name").innerText=gameName;
document.getElementById("playing-title").innerText="PLAYING: "+gameName.toUpperCase();

loader.style.display="block";
frame.style.display="none";
overlay.style.display="flex";

document.body.style.overflow="hidden";

frame.src=`https://www.gamepix.com/play/${gameId}?sid=1&mobile=1&autoplay=1`;

frame.onload=function(){
loader.style.display="none";
frame.style.display="block";
};

}

function closeGame(){

document.getElementById("game-frame").src="";
document.getElementById("player-overlay").style.display="none";
document.body.style.overflow="auto";

}

renderGames();

setTimeout(()=>{
document.getElementById("splash-screen").style.display="none";
},6000);

function openGame(gameId, gameName) {
    // ... your existing code ...

    // This creates a "fake" history state so the back button closes the game
    window.history.pushState({playing: true}, ""); 
}

// Add this event listener anywhere in your script
window.onpopstate = function(event) {
    if (document.getElementById("player-overlay").style.display === "flex") {
        closeGame();
    }
};

</script>

</body>
</html>
