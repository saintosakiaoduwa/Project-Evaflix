<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeonPlay | Premium Web Games</title>
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --card-bg: #161616;
            --neon-green: #39ff14;
            --dim-green: #1f4d1a;
            --text-gray: #a0a0a0;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            margin: 0; padding: 0;
            overflow-x: hidden;
        }

        header {
            border-bottom: 2px solid var(--neon-green);
            padding: 1rem 5%;
            display: flex; justify-content: space-between; align-items: center;
            background: #111;
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.2);
        }

        .logo { font-size: 1.8rem; font-weight: bold; color: var(--neon-green); text-transform: uppercase; letter-spacing: 2px; }

        .main-wrapper {
            display: flex;
            padding: 20px 5%;
            gap: 20px;
        }

        .content-area { flex: 3; }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 20px; 
        }

        .game-card { 
            background: var(--card-bg); 
            border-radius: 10px; 
            overflow: hidden; 
            border: 1px solid #222; 
            cursor: pointer; 
            transition: 0.3s; 
        }

        .game-card:hover { transform: translateY(-5px); border-color: var(--neon-green); }

        .game-card img { 
            width: 100%; 
            height: 150px; 
            object-fit: cover; 
            background: #222;
        }

        .game-info { padding: 12px; }
        .game-info h3 { margin: 0; font-size: 1rem; color: #fff; }
        .game-info p { margin: 5px 0 0; font-size: 0.8rem; color: var(--neon-green); }

        #player-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; 
        }
        
        iframe { width: 90%; height: 85%; border: 2px solid var(--neon-green); background: black; }
        
        .close-btn { position: absolute; top: 15px; right: 25px; font-size: 3rem; color: var(--neon-green); cursor: pointer; }

        #loader { text-align: center; color: var(--neon-green); }
    </style>
</head>
<body>

    <header>
        <div class="logo">NEON<span style="color:white">PLAY</span></div>
        <div style="font-size: 0.8rem; color: var(--neon-green)">MOBILE READY v2.0</div>
    </header>

    <div class="main-wrapper">
        <div class="content-area">
            <h2 style="border-left: 4px solid var(--neon-green); padding-left: 15px; margin-bottom: 25px;">Mission Hub</h2>
            <div class="grid" id="game-grid"></div>
        </div>
    </div>

    <div id="player-overlay">
        <span class="close-btn" onclick="closeGame()">&times;</span>
        <div id="loader"><h2>INITIALIZING SYSTEM...</h2></div>
        <iframe id="game-frame" src=""></iframe>
    </div>

    <script>
        const games = [
            { id: '8483f98c894b4e9491763131c36f2331', name: 'Bubble Shooter', cat: 'Arcade' },
            { id: '565d7593c789437194f4c6e9d6d5a1b5', name: 'Tomb Runner', cat: 'Adventure' },
            { id: '25463f84307a4a2789643f87b38d3900', name: 'Moto X3M', cat: 'Racing' },
            { id: '8072710ca51d4546870717643f07a23c', name: 'Stickman Hook', cat: 'Action' },
            { id: '668e27c7569b4395804300403756317b', name: 'Foot Chinko', cat: 'Sports' },
            { id: '560662d5930e4e5b902e825028e9668d', name: 'Snail Bob 7', cat: 'Puzzle' },
            { id: '69d78575080942858780376269666986', name: 'Little Big Snake', cat: '.IO' },
            { id: '095648f95c8942388656627068779836', name: 'Traffic Tom', cat: 'Driving' },
            { id: '7db2f2c81448496489438096d274094e', name: 'Mahjong', cat: 'Board' },
            { id: '3e08f52285e74d119e701979b0098f9a', name: 'Basketball Stars', cat: 'Sports' },
            { id: '536647970d244976a47a16e027415494', name: 'Block Puzzle', cat: 'Logic' },
            { id: '866759c8d6724659b81b89694e82417a', name: 'Sniper Mission', cat: 'Shooter' },
            { id: 'e92822a5796b412b93475f73d3215682', name: 'Drift King', cat: 'Racing' },
            { id: 'a29777c576594b2a8d9b1c5c56f8f555', name: 'Cyber Soldier', cat: 'Action' },
            { id: '99d78575080942858780376269666981', name: 'Kingdom Wars', cat: 'Strategy' }
        ];

        const grid = document.getElementById('game-grid');

        games.forEach(game => {
            const card = document.createElement('div');
            card.className = 'game-card';
            card.onclick = () => openGame(game.id);
            card.innerHTML = `
                <img src="https://img.gamedistribution.com/${game.id}-512x384.jpg" alt="${game.name}">
                <div class="game-info">
                    <h3>${game.name}</h3>
                    <p>${game.cat}</p>
                </div>
            `;
            grid.appendChild(card);
        });

        function openGame(id) {
            const overlay = document.getElementById('player-overlay');
            const frame = document.getElementById('game-frame');
            const loader = document.getElementById('loader');

            overlay.style.display = 'flex';
            loader.style.display = 'block';
            frame.style.display = 'none';

            // TWEAK: Using the API URL to force load on subdomains/live server
            frame.src = `https://html5.api.gamedistribution.com/main.html?url=https://html5.gamedistribution.com/${id}/`;

            setTimeout(() => {
                loader.style.display = 'none';
                frame.style.display = 'block';
            }, 3000);
        }

        function closeGame() {
            document.getElementById('player-overlay').style.display = 'none';
            document.getElementById('game-frame').src = "";
        }
    </script>
</body>
</html>
